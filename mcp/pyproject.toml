[tool.uv.workspace]
members = []

[dependency-groups]
dev = ["poethepoet>=0.40.0", "pyright==1.1.408"]

[tool.poe.tasks.check]
cmd = "pyright"

[tool.pyright]
include = ["mcp-tutor"]
extraPaths = ["mcp-tutor/src"]
exclude = ["**/__pycache__", "**/.*", "**/node_modules", ".venv"]
typeCheckingMode = "strict"
reportUnknownMemberType = "none"
reportMissingTypeStubs = "none"
