[tool.uv.workspace]
members = [
  "backend",
  "qwen-code-api",
  "mcp/mcp-tutor",
  "nanobot",
  "nanobot-websocket-channel/nanobot-channel-protocol",
  "nanobot-websocket-channel/mcp-webchat",
  "nanobot-websocket-channel/nanobot-webchat",
]

[tool.uv.sources]
tutor-backend = { path = "backend", editable = true }
mcp-tutor = { path = "mcp/mcp-tutor", editable = true }
mcp-webchat = { path = "nanobot-websocket-channel/mcp-webchat", editable = true }
nanobot-channel-protocol = { path = "nanobot-websocket-channel/nanobot-channel-protocol", editable = true }
nanobot-webchat = { path = "nanobot-websocket-channel/nanobot-webchat", editable = true }

[dependency-groups]
dev = [
  "poethepoet==0.42.1",
  "pyright==1.1.408",
  "pytest==9.0.2",
  "pytest-asyncio==1.3.0",
  "ruff==0.15.8",
  "ty==0.0.26",
]

[tool.ruff]
exclude = ["qwen-code-api"]

[tool.ruff.lint]
select = ["RET503"]

[tool.poe.tasks]
dev-unsafe.cmd = "python -m lms_backend.run"

[tool.poe.tasks.pyright-check]
cmd = "pyright"

[tool.poe.tasks.ty-check]
cmd = "ty check"

[tool.poe.tasks.format]
cmd = "ruff format"

[tool.poe.tasks.lint]
cmd = "ruff check"

[tool.pyright]
include = ["backend", "scripts", "mcp", "qwen-code-api"]
extraPaths = ["backend/src", "mcp/mcp-tutor/src", "qwen-code-api/src"]
exclude = ["**/__pycache__", "**/node_modules", "**/.*", ".venv", ".direnv"]
typeCheckingMode = "strict"
reportAssignmentType = "none"
reportIncompatibleVariableOverride = "none"
reportUnknownMemberType = "none"
reportMissingTypeStubs = "none"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend/src"]
asyncio_mode = "auto"

[tool.ty.src]
include = ["backend", "mcp", "qwen-code-api"]

[tool.ty.rules]
